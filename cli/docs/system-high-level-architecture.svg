<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#475569"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 800; fill: #fff; }
      .subtitle { font-size: 12px; fill: #cbd5e1; }
      .boxTitle { font-size: 16px; font-weight: 700; }
      .body { font-size: 12px; fill: #475569; }
      .label { font-size: 12px; font-weight: 700; fill: #64748b; letter-spacing: 1.2px; }
      .note { font-size: 11px; fill: #64748b; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="18" fill="url(#bg)"/>

  <rect x="0" y="0" width="1200" height="78" rx="18" fill="url(#header)"/>
  <rect x="0" y="42" width="1200" height="36" fill="url(#header)"/>
  <text x="600" y="34" text-anchor="middle" class="title">DuckyAI System Architecture</text>
  <text x="600" y="57" text-anchor="middle" class="subtitle">Simplified high-level view</text>

  <text x="60" y="118" class="label">ENTRY POINTS</text>
  <rect x="60" y="136" width="250" height="96" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="166" text-anchor="middle" fill="#1d4ed8" class="boxTitle">VS Code + Copilot</text>
  <text x="185" y="188" text-anchor="middle" class="body">Prompts, skills, chat, code work</text>
  <text x="185" y="206" text-anchor="middle" class="body">Interactive engineering workflow</text>

  <rect x="340" y="136" width="250" height="96" rx="16" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="465" y="166" text-anchor="middle" fill="#b45309" class="boxTitle">CLI</text>
  <text x="465" y="188" text-anchor="middle" class="body">duckyai, orchestrator commands, trigger commands</text>
  <text x="465" y="206" text-anchor="middle" class="body">Manual control and interactive sessions</text>

  <rect x="620" y="136" width="250" height="96" rx="16" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="166" text-anchor="middle" fill="#15803d" class="boxTitle">HTTP API</text>
  <text x="745" y="188" text-anchor="middle" class="body">Programmatic trigger and status access</text>
  <text x="745" y="206" text-anchor="middle" class="body">Remote control surface for the daemon</text>

  <rect x="900" y="136" width="240" height="96" rx="16" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1020" y="166" text-anchor="middle" fill="#6d28d9" class="boxTitle">Automatic Triggers</text>
  <text x="1020" y="188" text-anchor="middle" class="body">File changes, cron, pollers, queued tasks</text>
  <text x="1020" y="206" text-anchor="middle" class="body">Background automation</text>

  <line x1="185" y1="232" x2="185" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="232" x2="465" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="745" y1="232" x2="745" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1020" y1="232" x2="1020" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="60" y="316" class="label">CORE</text>
  <rect x="140" y="336" width="920" height="150" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="600" y="372" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="800">DuckyAI Orchestrator Core</text>
  <text x="600" y="400" text-anchor="middle" class="body">Loads configuration, receives trigger events, matches agents, manages execution, and coordinates follow-up work</text>

  <rect x="220" y="424" width="180" height="36" rx="10" fill="#eff6ff"/>
  <text x="310" y="447" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">Config + Agent Registry</text>

  <rect x="420" y="424" width="160" height="36" rx="10" fill="#fffbeb"/>
  <text x="500" y="447" text-anchor="middle" fill="#b45309" font-size="12" font-weight="700">Event Handling</text>

  <rect x="600" y="424" width="170" height="36" rx="10" fill="#ecfdf5"/>
  <text x="685" y="447" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">Execution Manager</text>

  <rect x="790" y="424" width="190" height="36" rx="10" fill="#f5f3ff"/>
  <text x="885" y="447" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">Dependency Chaining</text>

  <line x1="600" y1="486" x2="600" y2="538" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="60" y="566" class="label">INTEGRATIONS</text>

  <rect x="70" y="586" width="300" height="108" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="618" text-anchor="middle" fill="#0f172a" class="boxTitle">Executors</text>
  <text x="220" y="642" text-anchor="middle" class="body">Copilot SDK, Copilot CLI, Claude Code</text>
  <text x="220" y="662" text-anchor="middle" class="body">These run the actual agent prompts</text>

  <rect x="450" y="586" width="300" height="108" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="618" text-anchor="middle" fill="#0f172a" class="boxTitle">MCP Tools</text>
  <text x="600" y="642" text-anchor="middle" class="body">duckyai-vault, WorkIQ, release-dashboard</text>
  <text x="600" y="662" text-anchor="middle" class="body">Native operations and external tool access</text>

  <rect x="830" y="586" width="300" height="108" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="980" y="618" text-anchor="middle" fill="#0f172a" class="boxTitle">External Systems</text>
  <text x="980" y="642" text-anchor="middle" class="body">GitHub Copilot, Teams/M365, synced repos</text>
  <text x="980" y="662" text-anchor="middle" class="body">Models, communication data, reference content</text>

  <line x1="600" y1="538" x2="220" y2="586" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="538" x2="600" y2="586" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="538" x2="980" y2="586" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="60" y="724" class="label">PERSISTENT OUTPUT</text>
  <rect x="320" y="708" width="560" height="32" rx="16" fill="#0f172a" filter="url(#shadow)"/>
  <text x="600" y="729" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Obsidian Vault + Runtime State: notes, tasks, logs, sync state, queue files</text>

  <line x1="220" y1="694" x2="440" y2="708" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="600" y1="694" x2="600" y2="708" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="980" y1="694" x2="760" y2="708" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <text x="1140" y="742" text-anchor="end" class="note">Simple view: inputs → orchestrator core → integrations → vault output</text>
</svg>