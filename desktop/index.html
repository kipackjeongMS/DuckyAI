<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuckyAI Voice</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header>
        <div class="logo">🦆 DuckyAI</div>
        <div class="status" id="status">Ready</div>
      </header>

      <div class="chat-container" id="chat">
        <div class="welcome">
          <p>Hold <kbd>Space</kbd> to talk</p>
        </div>
      </div>

      <footer>
        <div class="mic-area">
          <button class="mic-btn" id="mic-btn">
            <span class="mic-icon">🎤</span>
          </button>
          <div class="mic-label" id="mic-label">Hold Space or click to talk</div>
        </div>
      </footer>
    </div>
  </body>
</html>
