version: "0.0.18"
id: duckyai_vault
name: duckyai_vault

user:
  name: "Kipack Jeong"
  primaryLanguage: ko
  timezone: "America/Los_Angeles"

orchestrator:
  auto_start: true
  prompts_dir: .github/prompts-agent
  skills_dir: .github/skills
  bases_dir: .github/bases
  max_concurrent: 3
  poll_interval: 1
  file_extensions:
    - .md
    - .pdf
    - .docx
    - .doc
    - .txt
defaults:
  executor: copilot_sdk
  timeout_minutes: 30
  max_parallel: 3
  task_create: true
  task_priority: medium
  task_archived: false
  agent_params:
    model: claude-sonnet-4.6
nodes:
  - type: agent
    name: Enrich Ingested Content (EIC)
    input_path: 00-Inbox
    output_path: 03-Knowledge/Documentation
    output_type: new_file
    enabled: true
  - type: agent
    name: Extract Document to Markdown (EDM)
    input_path: 00-Inbox
    output_path: 03-Knowledge/Documentation
    input_type: new_file
    input_pattern: "*.pdf|*.docx|*.doc|*.txt"
    trigger_exclude_pattern: "*.md"
    output_naming: "{title}.md"
    enabled: true
  - type: agent
    name: Generate Daily Roundup (GDR)
    cron: 0 18 * * 1-5
    output_path: 04-Periodic/Daily
    requires_input_file: false
    enabled: true
  - type: agent
    name: Topic Index Update (TIU)
    cron: 30 18 * * 5
    input_path: 04-Periodic/Daily
    output_path: 03-Knowledge/Topics
    requires_input_file: false
    enabled: true
  - type: agent
    name: Teams Chat Summary (TCS)
    cron: "10 * * * *"
    output_path: 04-Periodic/Daily
    output_type: update_file
    requires_input_file: false
    enabled: true
    agent_params:
      model: claude-haiku-4.5
      lookback_hours: 1
  - type: agent
    name: Teams Meeting Summary (TMS)
    cron: "10 * * * *"
    output_path: 04-Periodic/Daily
    output_type: update_file
    requires_input_file: false
    enabled: true
    agent_params:
      model: claude-haiku-4.5
      lookback_hours: 24