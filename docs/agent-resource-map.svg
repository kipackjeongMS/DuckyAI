<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc3545"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">DuckyAI Agent Execution — Shared Resource Map</text>

  <!-- ===== PROCESS LANE: Daemon ===== -->
  <rect x="30" y="55" width="380" height="200" rx="10" fill="#e8f4fd" stroke="#b8daff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#004085">Daemon Process (duckyai -o)</text>
  <text x="220" y="94" text-anchor="middle" font-size="10" fill="#666">PID written to .orchestrator.pid</text>

  <!-- Cron Scheduler -->
  <rect x="50" y="110" width="140" height="44" rx="6" fill="#fff" stroke="#b8daff" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#004085">Cron Scheduler</text>
  <text x="120" y="143" text-anchor="middle" font-size="9" fill="#666">"10 * * * *"</text>

  <!-- Queue Processor -->
  <rect x="220" y="110" width="170" height="44" rx="6" fill="#fff" stroke="#b8daff" stroke-width="1"/>
  <text x="305" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#004085">Queue Processor</text>
  <text x="305" y="143" text-anchor="middle" font-size="9" fill="#666">_process_queued_tasks()</text>

  <!-- Agent Execution (Daemon) -->
  <rect x="100" y="175" width="220" height="44" rx="6" fill="#cce5ff" stroke="#004085" stroke-width="1.5"/>
  <text x="210" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#004085">_execute_agent(TCS/TMS)</text>
  <text x="210" y="208" text-anchor="middle" font-size="9" fill="#666">threaded, slot-managed</text>

  <!-- Arrows inside daemon -->
  <line x1="120" y1="154" x2="180" y2="175" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="305" y1="154" x2="250" y2="175" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== PROCESS LANE: Inline Trigger ===== -->
  <rect x="490" y="55" width="380" height="200" rx="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">Inline Trigger (orchestrator trigger)</text>
  <text x="680" y="94" text-anchor="middle" font-size="10" fill="#666">No PID file, runs in foreground</text>

  <!-- CLI Command -->
  <rect x="530" y="110" width="160" height="44" rx="6" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="610" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">trigger_agent_once()</text>
  <text x="610" y="143" text-anchor="middle" font-size="9" fill="#666">--lookback override</text>

  <!-- duckyai startup -->
  <rect x="710" y="110" width="140" height="44" rx="6" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="780" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">duckyai startup</text>
  <text x="780" y="143" text-anchor="middle" font-size="9" fill="#666">_enqueue_*_task()</text>

  <!-- Agent Execution (Inline) -->
  <rect x="560" y="175" width="200" height="44" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5"/>
  <text x="660" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">_execute_agent(TCS/TMS)</text>
  <text x="660" y="208" text-anchor="middle" font-size="9" fill="#666">synchronous, no slot mgmt</text>

  <!-- Arrows inside inline -->
  <line x1="610" y1="154" x2="640" y2="175" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Startup enqueues to daemon -->
  <path d="M 780 154 L 780 170 Q 780 180 770 180 L 430 180 Q 420 180 420 170 L 420 154 Q 420 144 410 144 L 395 144" stroke="#999" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)" fill="none"/>
  <text x="580" y="172" text-anchor="middle" font-size="8" fill="#999">enqueues task file for daemon</text>

  <!-- ===== SHARED RESOURCES ===== -->
  <rect x="80" y="300" width="740" height="290" rx="10" fill="#f0f0f0" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Shared Resources (per vault)</text>

  <!-- Watermark Files -->
  <rect x="110" y="345" width="230" height="100" rx="8" fill="#fff" stroke="#dc3545" stroke-width="2"/>
  <text x="225" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#dc3545">⚠ Watermark Files</text>
  <text x="225" y="386" text-anchor="middle" font-size="10" fill="#555">~/.duckyai/vaults/{id}/state/</text>
  <text x="225" y="404" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#333">tcs-last-sync.json</text>
  <text x="225" y="420" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#333">tms-last-sync.json</text>
  <text x="225" y="438" text-anchor="middle" font-size="9" fill="#dc3545" font-weight="600">NO LOCK — race condition possible</text>

  <!-- Daily Notes -->
  <rect x="370" y="345" width="200" height="100" rx="8" fill="#fff" stroke="#28a745" stroke-width="2"/>
  <text x="470" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#28a745">Daily Notes</text>
  <text x="470" y="386" text-anchor="middle" font-size="10" fill="#555">04-Periodic/Daily/</text>
  <text x="470" y="404" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#333">YYYY-MM-DD.md</text>
  <text x="470" y="420" text-anchor="middle" font-size="9" fill="#666">append via MCP tool</text>
  <text x="470" y="438" text-anchor="middle" font-size="9" fill="#28a745" font-weight="600">Append-only — lower risk</text>

  <!-- Task Files -->
  <rect x="600" y="345" width="200" height="100" rx="8" fill="#fff" stroke="#6f42c1" stroke-width="2"/>
  <text x="700" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#6f42c1">Task Files</text>
  <text x="700" y="386" text-anchor="middle" font-size="10" fill="#555">~/.duckyai/vaults/{id}/tasks/</text>
  <text x="700" y="404" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#333">YYYY-MM-DD TCS-*.md</text>
  <text x="700" y="420" text-anchor="middle" font-size="9" fill="#666">status: QUEUED → completed</text>
  <text x="700" y="438" text-anchor="middle" font-size="9" fill="#6f42c1" font-weight="600">1 file per run — no conflict</text>

  <!-- duckyai.yml -->
  <rect x="260" y="470" width="180" height="55" rx="8" fill="#fff" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="350" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#17a2b8">duckyai.yml</text>
  <text x="350" y="508" text-anchor="middle" font-size="9" fill="#666">agent_params, lookback_hours</text>
  <text x="350" y="522" text-anchor="middle" font-size="9" fill="#17a2b8">Read-only at runtime</text>

  <!-- MCP Server -->
  <rect x="470" y="470" width="180" height="55" rx="8" fill="#fff" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="560" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#17a2b8">MCP Server</text>
  <text x="560" y="508" text-anchor="middle" font-size="9" fill="#666">duckyai-vault tools</text>
  <text x="560" y="522" text-anchor="middle" font-size="9" fill="#17a2b8">1 instance per agent run</text>

  <!-- ===== ARROWS from processes to shared resources ===== -->
  <!-- Daemon → Watermark (R/W) -->
  <path d="M 210 219 L 210 260 Q 210 270 215 275 L 220 340" stroke="#dc3545" stroke-width="2" marker-end="url(#arrow-red)" fill="none"/>
  <text x="175" y="278" font-size="9" fill="#dc3545" font-weight="600">R/W</text>

  <!-- Inline → Watermark (R/W) -->
  <path d="M 620 219 L 620 270 Q 620 280 600 290 L 340 335 L 300 345" stroke="#dc3545" stroke-width="2" marker-end="url(#arrow-red)" fill="none" stroke-dasharray="6,3"/>
  <text x="500" y="290" font-size="9" fill="#dc3545" font-weight="600">R/W</text>

  <!-- Daemon → Daily Notes -->
  <line x1="250" y1="219" x2="440" y2="345" stroke="#28a745" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Inline → Daily Notes -->
  <line x1="660" y1="219" x2="500" y2="345" stroke="#28a745" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Daemon → Task Files -->
  <line x1="310" y1="219" x2="670" y2="345" stroke="#6f42c1" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Legend -->
  <rect x="110" y="550" width="690" height="42" rx="6" fill="#fff" stroke="#ddd"/>
  <line x1="130" y1="571" x2="160" y2="571" stroke="#dc3545" stroke-width="2"/>
  <text x="165" y="575" font-size="10" fill="#333">Read/Write (race risk)</text>
  <line x1="310" y1="571" x2="340" y2="571" stroke="#28a745" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="345" y="575" font-size="10" fill="#333">Append (low risk)</text>
  <line x1="480" y1="571" x2="510" y2="571" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="515" y="575" font-size="10" fill="#333">Enqueue (async handoff)</text>
  <circle cx="660" cy="571" r="5" fill="#dc3545"/>
  <text x="670" y="575" font-size="10" fill="#333">⚠ = No locking</text>
</svg>
