# Canonical node definitions for DuckyAI agents.
# Used by `duckyai update` to inject missing nodes into user's duckyai.yml.
# Only nodes NOT already present (by name) are added.

- type: agent
  name: Teams Chat Summary (TCS)
  cron: "0 */2 * * MON-FRI"
  output_path: 04-Periodic/Daily
  output_type: update_file
  requires_input_file: false
  max_parallel: 1
  enabled: true
  use_container: false
  executor: agency
  mcp_servers: [teams]
  agent_params:
    lookback_hours: 24

- type: agent
  name: Teams Meeting Summary (TMS)
  cron: "0 */2 * * MON-FRI"
  output_path: 04-Periodic/Daily
  output_type: update_file
  requires_input_file: false
  max_parallel: 1
  enabled: true
  use_container: false
  executor: agency
  mcp_servers: [teams]
  agent_params:
    lookback_hours: 24

- type: agent
  name: Task Manager (TM)
  trigger_wait_for: [TCS, TMS]
  require_parent_output: true
  output_path: 04-Periodic/Daily
  output_type: update_file
  requires_input_file: false
  enabled: true
  use_container: false
  agent_params:
    model: claude-haiku-4.5

- type: agent
  name: Task Planner (TP)
  input_type: manual
  output_type: update_file
  output_optional: true
  max_parallel: 1
  timeout_minutes: 30
  use_container: false
  enabled: true

- type: agent
  name: PR Review (PR)
  input_path: 01-Work/PRReviews
  output_type: update_file
  input_type: new_file
  input_pattern: "*.md"
  trigger_content_pattern: "^status:\\s*todo"
  requires_input_file: true
  max_parallel: 3
  enabled: true
  use_container: false

- type: agent
  name: PR Scan (PRS)
  cron: "15 */2 * * *"
  output_path: 01-Work/PRReviews
  output_type: new_file
  use_container: false

- type: agent
  name: Daily Note Prep (DNP)
  cron: "0 7 * * MON-FRI"
  output_path: 04-Periodic/Daily
  output_type: new_file
  requires_input_file: false
  max_parallel: 1
  enabled: true
  use_container: false
  agent_params:
    lookback_days: 7

- type: agent
  name: Service Sync (SVC)
  requires_input_file: false
  max_parallel: 1
  enabled: true
  use_container: false
